<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>至尊加密终端 Pro | Crypto Terminal</title>
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #00ffcc; --up: #00ff88; --down: #ff3366; --text: #e0e0e0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 顶部状态栏 */
        .header { background: var(--card); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
        .logo { font-weight: 900; font-size: 1.2rem; color: var(--accent); letter-spacing: 1px; }
        .market-cap { font-size: 0.8rem; color: #888; }

        /* 主体布局 */
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* 左侧行情列表 */
        .side-bar { width: 320px; background: var(--card); border-right: 1px solid #222; overflow-y: auto; padding: 10px; }
        .coin-item { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .coin-item:hover { border-color: var(--accent); background: #222; }
        .coin-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .coin-symbol { font-weight: bold; }
        .coin-change { font-size: 0.75rem; padding: 2px 6px; border-radius: 4px; }

        /* 中间图表区 */
        .chart-area { flex: 1; display: flex; flex-direction: column; background: #000; }
        #tradingview_widget { flex: 1; }

        /* 右侧资产计算器 */
        .right-bar { width: 300px; background: var(--card); border-left: 1px solid #222; padding: 20px; }
        .p-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-top: 15px; }
        input { width: 100%; padding: 10px; margin-top: 10px; background: #222; border: 1px solid #333; color: #fff; border-radius: 6px; outline: none; }
        .calc-res { margin-top: 15px; font-weight: bold; font-size: 1.1rem; color: var(--accent); }

        /* 颜色辅助类 */
        .up { color: var(--up); }
        .down { color: var(--down); }
        .bg-up { background: rgba(0, 255, 136, 0.1); color: var(--up); }
        .bg-down { background: rgba(255, 51, 102, 0.1); color: var(--down); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">CRYPTO TERMINAL PRO</div>
        <div class="market-cap">全球市场情绪: <span id="fgi">载入中...</span></div>
        <div id="update-time" style="font-size: 0.7rem; color: #666;">最后同步: --:--:--</div>
    </div>

    <div class="main-layout">
        <div class="side-bar" id="coin-list">
            <div style="text-align: center; color: #444; margin-top: 50px;">正在连接数据源...</div>
        </div>

        <div class="chart-area">
            <div id="tradingview_widget"></div>
        </div>

        <div class="right-bar">
            <h3>💰 资产模拟器</h3>
            <div class="p-box">
                <label style="font-size: 0.7rem;">选择持仓 (BTC)</label>
                <input type="number" id="p-amount" placeholder="持有数量" oninput="calcROI()">
                <input type="number" id="p-cost" placeholder="买入成本 (USD)" oninput="calcROI()">
                <div class="calc-res" id="roi-output">盈亏: $0.00</div>
                <div style="font-size: 0.65rem; color: #888; margin-top: 5px;" id="roi-percent">回报率: 0%</div>
            </div>

            <div class="p-box" style="margin-top: 30px;">
                <h4 style="margin:0; font-size: 0.8rem; color: var(--accent);">🔥 快速操作</h4>
                <button onclick="fetchData()" style="width:100%; padding:10px; margin-top:10px; background:var(--accent); color:#000; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">刷新全网数据</button>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let currentBtcPrice = 0;

        // 1. 初始化 TradingView 图表
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "60",
            "timezone": "Asia/Singapore",
            "theme": "dark",
            "style": "1",
            "locale": "zh_CN",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_top_toolbar": false,
            "save_image": false,
            "container_id": "tradingview_widget"
        });

        // 2. 获取行情数据
        async function fetchData() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,dogecoin,binancecoin,solana&vs_currencies=usd&include_24hr_change=true');
                const data = await response.json();
                
                currentBtcPrice = data.bitcoin.usd;
                renderList(data);
                document.getElementById('update-time').innerText = "最后同步: " + new Date().toLocaleTimeString();
                calcROI(); // 刷新价格时同步刷新资产

                // 获取恐惧贪婪指数
                const fgiRes = await fetch('https://api.alternative.me/fng/');
                const fgiData = await fgiRes.json();
                document.getElementById('fgi').innerText = `${fgiData.data[0].value} (${fgiData.data[0].value_classification})`;
            } catch (e) {
                console.error("Fetch Error");
            }
        }

        function renderList(data) {
            const list = document.getElementById('coin-list');
            list.innerHTML = '';
            
            const coins = [
                { id: 'bitcoin', name: 'Bitcoin', sym: 'BTC' },
                { id: 'ethereum', name: 'Ethereum', sym: 'ETH' },
                { id: 'binancecoin', name: 'BNB', sym: 'BNB' },
                { id: 'solana', name: 'Solana', sym: 'SOL' },
                { id: 'dogecoin', name: 'Dogecoin', sym: 'DOGE' }
            ];

            coins.forEach(c => {
                const info = data[c.id];
                const change = info.usd_24h_change.toFixed(2);
                const isUp = change >= 0;
                
                list.innerHTML += `
                    <div class="coin-item">
                        <div class="coin-header">
                            <span class="coin-symbol">${c.sym}/USD</span>
                            <span class="coin-change ${isUp ? 'bg-up' : 'bg-down'}">${isUp ? '+' : ''}${change}%</span>
                        </div>
                        <div style="font-family:monospace; font-size:1.1rem; font-weight:bold;">
                            $${info.usd.toLocaleString()}
                        </div>
                    </div>
                `;
            });
        }

        // 3. 资产计算逻辑
        function calcROI() {
            const amount = document.getElementById('p-amount').value;
            const cost = document.getElementById('p-cost').value;
            if (amount && cost && currentBtcPrice) {
                const currentVal = amount * currentBtcPrice;
                const totalCost = amount * cost;
                const profit = currentVal - totalCost;
                const percent = (profit / totalCost * 100).toFixed(2);

                document.getElementById('roi-output').innerText = `盈亏: ${profit >= 0 ? '+$' : '-$'}${Math.abs(profit).toLocaleString()}`;
                document.getElementById('roi-output').className = `calc-res ${profit >= 0 ? 'up' : 'down'}`;
                document.getElementById('roi-percent').innerText = `回报率: ${percent}%`;
            }
        }

        // 自动运行
        fetchData();
        setInterval(fetchData, 60000); // 1分钟同步一次价格
    </script>
</body>
</html>
